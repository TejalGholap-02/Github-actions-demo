name: CI-CD-Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Build Docker image
      run: docker build -t myapp .

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.dockermaster1008 }}
        password: ${{ secrets.Tejal@020301 }}

    - name: Tag image
      run: docker tag myapp dockermaster1008/myapp:latest

    - name: Push image
      run: docker push dockermaster1008/myapp:latest